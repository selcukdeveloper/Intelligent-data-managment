<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — DW Umbrella</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #1a2332;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      color: #222;
      padding: 32px;
      border-radius: 8px;
      width: 360px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      font-size: 20px;
      margin: 0 0 4px 0;
    }
    .login-card p.sub {
      color: #718096;
      font-size: 13px;
      margin: 0 0 20px 0;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2d3748;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      background: #2b6cb0;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background: #2c5282; }
    .error {
      background: #fff5f5;
      color: #c53030;
      padding: 10px;
      border-radius: 4px;
      border-left: 4px solid #c53030;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .hint {
      margin-top: 20px;
      padding: 12px;
      background: #edf2f7;
      border-radius: 4px;
      font-size: 12px;
      color: #4a5568;
      line-height: 1.6;
    }
    .hint code {
      background: white;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", Menlo, monospace;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Data Warehouse Umbrella</h1>
    <p class="sub">Sign in to continue</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <input type="hidden" name="next" value="{{ next_url }}" />
      <button type="submit">Sign in</button>
    </form>

    <div class="hint">
      <strong>Demo accounts:</strong><br/>
      <code>tier1 / tier1</code> — general queries only<br/>
      <code>tier2 / tier2</code> — all queries + custom<br/>
      <code>admin / admin</code> — full access
    </div>
  </div>
</body>
</html>
