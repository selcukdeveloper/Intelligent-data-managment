# Cloud-only setup: Flask umbrella connecting to Supabase, Neo4j Aura, and MongoDB Atlas
# All credentials come from .env file

services:
  umbrella:
    build: .
    container_name: dw_umbrella
    ports:
      - "5000:5000"
    environment:
      # --- PostgreSQL / Supabase ---
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:-postgres}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD}

      # --- Neo4j Aura ---
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # --- MongoDB Atlas ---
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
    volumes:
      - ./app:/app  # live-reload during dev
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "true"
